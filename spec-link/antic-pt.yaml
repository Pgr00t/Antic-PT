# Antic-PT Spec-Link Configuration

port: 4000
prefix: "/spec"

vault:
  driver: "memory"       # "memory" or "redis"
  # url: "redis://localhost:6379"   # Required when driver is "redis".
  #                                 # Also accepts: redis://<user>:<pass>@<host>:<port>/<db>
  #                                 # DragonflyDB works as a drop-in replacement.
  default_ttl_ms: 30000            # Vault entries expire after this many ms.

intent:
  mode: "auto"           # "auto", "guided", or "bypass"
  ai_confidence_threshold: 0.75

formal_track:
  # Upstream points to your actual backend.
  # Set to "embedded" for demo mode, which spawns a built-in mock API.
  upstream: "embedded"
  timeout_ms: 5000

reconciliation:
  strategy: "patch"      # "patch" or "replace"

mutations:
  enabled: true                   # Set false to keep the proxy read-only.
  # body_limit_bytes: 1048576     # 1MB (industry default). Override if needed.
  conflict_policy: "server-wins"  # Server response is always sent to client on committed.
